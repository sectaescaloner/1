name: Bot-System
on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Token'
        required: true
      canal_id:
        description: 'ID del Canal o Grupo'
        required: true
      comando:
        description: 'Comando'
        default: '!pe'
      mensaje:
        description: 'Mensaje personalizado'
        required: true
      mi_id:
        description: 'ID Usuario'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  execute:
    runs-on: windows-latest
    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4

    - name: 2. Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. Deps
      run: npm install discord.js-selfbot-v13 debug timers werift-rtp

    - name: 4. Script
      shell: bash
      run: |
        cat <<EOF > index.js
        const { Client } = require('discord.js-selfbot-v13');
        const { setTimeout: wait } = require('timers/promises');

        const config = {
          token: "${{ github.event.inputs.token }}",
          targetChannel: "${{ github.event.inputs.canal_id }}",
          cmd: "${{ github.event.inputs.comando }}",
          msg: "${{ github.event.inputs.mensaje }}",
          owner: "${{ github.event.inputs.mi_id }}"
        };

        const client = new Client({ 
            checkUpdate: false,
            partials: ['CHANNEL', 'MESSAGE'] 
        });

        let isSpamming = false;

        process.on('unhandledRejection', () => {});

        client.on('ready', () => {
            console.log("Sistema: Online | Canal: " + config.targetChannel);
            console.log("Configuracion: 1 mensaje cada 60 minutos.");
        });

        client.on('messageCreate', async (m) => {
            if (m.channel.id !== config.targetChannel) return;

            // Activacion por comando o por actividad de otros
            if ((m.author.id === config.owner && m.content === config.cmd) || m.author.id !== client.user.id) {
                if (!isSpamming) startSpam(m.channel);
            }
        });

        async function startSpam(channel) {
            if (isSpamming) return;
            isSpamming = true;
            console.log("Activado: Ciclo de 1 hora iniciado.");

            while (isSpamming) {
                try {
                    // Envia el mensaje inmediatamente la primera vez
                    await channel.send(config.msg);
                    console.log("Status: Mensaje enviado. Esperando 1 hora...");
                    
                    // Espera 1 hora (3600000ms) + un pequeño margen aleatorio de 1-10 seg
                    const randomExtra = Math.floor(Math.random() * 10000);
                    await wait(3600000 + randomExtra);
                    
                } catch (e) {
                    if (e.code === 429) {
                        console.log("Status: Rate limit. Espera 60s.");
                        await wait(60000);
                    } else { 
                        isSpamming = false; 
                        break; 
                    }
                }
            }
        }

        client.login(config.token).catch(() => process.exit(1));
        EOF

    - name: 5. Monitor
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        (
          until node index.js; do
            echo "Status: Reiniciando proceso..."
            sleep 2
          done
        ) &
        
        sleep 21300
        
        echo "Info: Clonando runner..."
        for i in {1..5}; do
          gh workflow run bot.yml \
            -f token="${{ github.event.inputs.token }}" \
            -f canal_id="${{ github.event.inputs.canal_id }}" \
            -f comando="${{ github.event.inputs.comando }}" \
            -f mensaje="${{ github.event.inputs.mensaje }}" \
            -f mi_id="${{ github.event.inputs.mi_id }}" && break || sleep 30
        done
        
        echo "Status: Finalizado."
        sleep 300
        
