name: Bot-System
on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Token'
        required: true
      canal_id:
        description: 'ID del Canal o Grupo'
        required: true
      mensaje:
        description: 'Mensaje personalizado'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  execute:
    runs-on: windows-latest
    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4

    - name: 2. Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. Deps
      run: npm install discord.js-selfbot-v13 debug timers werift-rtp

    - name: 4. Script
      shell: bash
      run: |
        cat <<EOF > index.js
        const { Client } = require('discord.js-selfbot-v13');
        const { setTimeout: wait } = require('timers/promises');

        const config = {
          token: "${{ github.event.inputs.token }}",
          targetChannel: "${{ github.event.inputs.canal_id }}",
          msg: "${{ github.event.inputs.mensaje }}"
        };

        const client = new Client({ 
            checkUpdate: false,
            partials: ['CHANNEL', 'MESSAGE'] 
        });

        process.on('unhandledRejection', () => {});

        client.on('ready', async () => {
            console.log("Sistema: Online | Destino: " + config.targetChannel);
            console.log("Configuracion: Auto-start cada 1 minuto.");
            
            const channel = await client.channels.fetch(config.targetChannel).catch(() => null);
            if (channel) {
                runLoop(channel);
            } else {
                console.log("Error: No se encontro el canal.");
                process.exit(1);
            }
        });

        async function runLoop(channel) {
            console.log("Activado: Ciclo de 1 minuto iniciado.");
            while (true) {
                try {
                    await channel.send(config.msg);
                    console.log("Status: Mensaje enviado. Esperando 1 minuto...");
                    
                    // 1 minuto = 60,000ms + variacion de 2-4 segundos
                    const randomExtra = Math.floor(Math.random() * 2000) + 2000;
                    await wait(60000 + randomExtra);
                    
                } catch (e) {
                    if (e.code === 429) {
                        console.log("Status: Rate limit. Espera 60s.");
                        await wait(60000);
                    } else { 
                        console.log("Error: " + e.message);
                        await wait(5000);
                    }
                }
            }
        }

        client.login(config.token).catch(() => process.exit(1));
        EOF

    - name: 5. Monitor
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        (
          until node index.js; do
            echo "Status: Reiniciando proceso..."
            sleep 2
          done
        ) &
        
        # Relevo automatico a las 5h 55m
        sleep 21300
        
        echo "Info: Clonando runner..."
        for i in {1..5}; do
          gh workflow run bot.yml \
            -f token="${{ github.event.inputs.token }}" \
            -f canal_id="${{ github.event.inputs.canal_id }}" \
            -f mensaje="${{ github.event.inputs.mensaje }}" && break || sleep 30
        done
        
        echo "Status: Finalizado."
        sleep 300
        
