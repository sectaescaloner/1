name: Bot-System
on:
  workflow_dispatch:
    inputs:
      token:
        required: true
      canal_id:
        required: true
      mensaje:
        required: true
      mi_id:
        required: true

permissions:
  contents: write
  actions: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4

    - name: 2. Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. Deps
      run: npm install discord.js-selfbot-v13 timers

    - name: 4. Script Ultra-Resistente
      shell: bash
      run: |
        cat <<EOF > index.js
        const { Client } = require('discord.js-selfbot-v13');
        const { setTimeout: wait } = require('timers/promises');

        const config = {
          token: "${{ github.event.inputs.token }}",
          targetChannel: "${{ github.event.inputs.canal_id }}",
          msg: "${{ github.event.inputs.mensaje }}",
          owner: "${{ github.event.inputs.mi_id }}"
        };

        const client = new Client({ checkUpdate: false });
        let isSpamming = false;
        let lastSentTime = Date.now();

        client.on('ready', async () => {
            console.log("Sistema: ONLINE | " + client.user.tag);
            
            // Monitor cada 30 seg
            setInterval(async () => {
                if (Date.now() - lastSentTime > 120000) {
                    console.log("Status: Re-activando flujo...");
                    isSpamming = false;
                    const ch = await client.channels.fetch(config.targetChannel).catch(() => null);
                    if (ch) startSpam(ch);
                }
            }, 30000);
        });

        client.on('messageCreate', async (m) => {
            if (m.channel.id === config.targetChannel && !isSpamming) {
                startSpam(m.channel);
            }
        });

        async function startSpam(channel) {
            if (isSpamming) return;
            isSpamming = true;
            while (isSpamming) {
                try {
                    const delay = Math.floor(Math.random() * 2000) + 2000;
                    await wait(delay);
                    await channel.send(config.msg);
                    lastSentTime = Date.now();
                } catch (e) {
                    if (e.code === 429) {
                        await wait(60000);
                        lastSentTime = Date.now();
                    } else { isSpamming = false; break; }
                }
            }
        }
        client.login(config.token).catch(() => process.exit(1));
        EOF

    - name: 5. Monitor y Relevo Seguro
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Ejecuta el bot en segundo plano
        node index.js &
        
        # Relevo a las 3 horas (10800 seg) para evitar que GitHub bloquee el runner
        echo "Info: Temporizador de relevo iniciado (3h)..."
        sleep 10800
        
        echo "Info: Iniciando clonacion..."
        for i in {1..10}; do
          if gh workflow run "${{ github.workflow }}" \
            -f token="${{ github.event.inputs.token }}" \
            -f canal_id="${{ github.event.inputs.canal_id }}" \
            -f mensaje="${{ github.event.inputs.mensaje }}" \
            -f mi_id="${{ github.event.inputs.mi_id }}"; then
            echo "Status: Clonacion EXITOSA."
            break
          fi
          sleep 30
        done
        
        # Espera un poco para que el nuevo tome el mando y cierra este
        sleep 60
        exit 0
        
